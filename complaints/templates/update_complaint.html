{% extends 'base.html' %}

{% block content %}

<h1>{{ complaint.title }}</h1>
<h2>{{ complaint.description }}</h2>
<h3>{{ complaint.status }}</h3>

<form method="post">
    {% csrf_token %}
    <input type="text" name="status" placeholder="Enter new status" class="form-control">
    <button type="submit" class="btn btn-primary">Update Status</button>
</form>

{% endblock %}
